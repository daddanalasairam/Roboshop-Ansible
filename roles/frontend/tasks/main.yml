- name: Set Prompt
  ansible.builtin.shell: set-prompt {{ app_name }}-{{ env }}

- name: Disable Default Nginx
  ansible.builtin.dnf: dnf module disable nginx -y

- name: Enable Nginx 1.24
  ansible.builtin.dnf: dnf module enable nginx:1.24 -y

- name: Install Nginx
  ansible.builtin.dnf: dnf install nginx -y

- name: Copy Nginx config file
  ansible.builtin.template:
    src: nginx.conf
    dest: /etc/nginx/nginx.conf

- name: Cleanup Old Application Directory
  ansible.builtin.file:
    path: /usr/share/nginx/html
    state: absent

- name: Create Application Directory
  ansible.builtin.file:
    path: /usr/share/nginx/html
    state: directory

- name: Download and Extract Application Content
  ansible.builtin.unarchive:
    src: https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip
    dest: /usr/share/nginx/html
    remote_src: yes

- name: Start Nginx
  ansible.builtin.systemd_service:
    name: nginx
    state: restarted
    enabled: yes