- name: Set Prompt
  ansible.builtin.shell: set-prompt {{ app_name }}-{{ env }}

- name: Load NodeJS
    ansible.builtin.include_role:
      name: common
      task_from: nodejs

nodejs_setup

print_heading "Copy MongoDB repo file"
cp $scripts_path/mongo.repo /etc/yum.repos.d/mongo.repo &>>$log_file
status_check $?

print_heading "Install MongoDB Client"
dnf install mongodb-mongosh -y &>>$log_file
status_check $?

print_heading "Load Master Data"
mongosh --host mongodb.sairamdevops.online </app/db/master-data.js &>>$log_file
status_check $?

print_heading "Restart Catalogue Service"
systemctl restart catalogue &>>$log_file
status_check $?