- name: Install MySql Server
  ansible.builtin.dnf:
    name: mysql-server
    state: present

- name: Start MySql Service
  ansible.builtin.systemd_service:
    name: mysqld
    state: restarted
    enabled: yes

- name: Setup MySql Password
  ansible.builtin.shell: mysql_secure_installation --set-root-pass RoboShop@1



