- name: Set Prompt
  ansible.builtin.shell: set-prompt {{ app_name }}-{{ env }}

- name: Load Maven
  ansible.builtin.include_role:
    name: common
    task_from: maven

- name: Install MySql Client
  ansible.builtin.dnf:
    name: mysql
    state: present

- name: Load SQL File
  ansible.builtin.shell: mysql -h <mysql-{{ env }}.sairamdevops.online> -uroot -pRoboShop@1 < /app/db/{{ item }}.sql
  loop:
    - schema
    - app-user
    - master-data

- name: Restart Shipping Service
  ansible.builtin.systemd_service:
    name: shipping
    state: restarted

